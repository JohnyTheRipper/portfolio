<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">JARVIS command interface visual</title>
  <desc id="desc">A HUD-style command center layout based on the JARVIS desktop interface panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020506"/>
      <stop offset="0.55" stop-color="#071013"/>
      <stop offset="1" stop-color="#0d191c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1cf5ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="960" height="720" fill="url(#bg)"/>
  <rect width="960" height="720" fill="url(#grid)"/>
  <rect x="26" y="24" width="212" height="500" fill="#02080a" fill-opacity="0.84" stroke="#22f5ff" stroke-opacity="0.56"/>
  <rect x="722" y="24" width="212" height="500" fill="#02080a" fill-opacity="0.84" stroke="#22f5ff" stroke-opacity="0.56"/>
  <rect x="258" y="24" width="444" height="500" fill="#02080a" fill-opacity="0.78" stroke="#22f5ff" stroke-opacity="0.64"/>
  <rect x="26" y="544" width="908" height="148" fill="#02080a" fill-opacity="0.86" stroke="#22f5ff" stroke-opacity="0.62"/>
  <text x="46" y="58" fill="#22f5ff" font-family="monospace" font-size="18" font-weight="700">PANEL / JARVIS CORE</text>
  <text x="742" y="58" fill="#22f5ff" font-family="monospace" font-size="18" font-weight="700">PANEL / SYSTEMS</text>
  <text x="282" y="58" fill="#22f5ff" font-family="monospace" font-size="18" font-weight="700">JARVIS COMMAND INTERFACE</text>
  <text x="46" y="578" fill="#22f5ff" font-family="monospace" font-size="18" font-weight="700">CONTROL DECK</text>
  <g fill="none" stroke="#22f5ff" stroke-opacity="0.42">
    <rect x="48" y="84" width="168" height="78"/>
    <rect x="48" y="180" width="168" height="78"/>
    <rect x="48" y="276" width="168" height="78"/>
    <rect x="48" y="372" width="168" height="78"/>
    <rect x="744" y="84" width="168" height="78"/>
    <rect x="744" y="180" width="168" height="78"/>
    <rect x="744" y="276" width="168" height="78"/>
    <rect x="744" y="372" width="168" height="78"/>
  </g>
  <g fill="#60ff9a" font-family="monospace" font-size="15" font-weight="700">
    <text x="64" y="114">CORE STATUS</text>
    <text x="64" y="210">VOICE</text>
    <text x="64" y="306">VISION</text>
    <text x="64" y="402">IDENTITY</text>
    <text x="760" y="114">OLLAMA</text>
    <text x="760" y="210">HOST</text>
    <text x="760" y="306">NETWORK</text>
    <text x="760" y="402">EVENTS</text>
  </g>
  <circle cx="480" cy="274" r="132" fill="none" stroke="#22f5ff" stroke-width="2" stroke-opacity="0.36" filter="url(#glow)"/>
  <circle cx="480" cy="274" r="92" fill="none" stroke="#60ff9a" stroke-width="3" stroke-opacity="0.72"/>
  <circle cx="480" cy="274" r="54" fill="#22f5ff" fill-opacity="0.08" stroke="#22f5ff" stroke-width="2"/>
  <text x="480" y="268" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="28" font-weight="800">JARVIS</text>
  <text x="480" y="302" text-anchor="middle" fill="#60ff9a" font-family="monospace" font-size="18" font-weight="700">LOCAL CORE</text>
  <g fill="#22f5ff" fill-opacity="0.76" font-family="monospace" font-size="14">
    <text x="292" y="460">TEXT + VOICE PROMPTS</text>
    <text x="292" y="486">OLLAMA MODEL SELECTOR</text>
    <text x="292" y="512">VISION / IDENTITY PANELS</text>
  </g>
  <g fill="#0f1719" stroke="#22f5ff" stroke-opacity="0.56">
    <rect x="50" y="606" width="96" height="38"/>
    <rect x="158" y="606" width="126" height="38"/>
    <rect x="296" y="606" width="112" height="38"/>
    <rect x="420" y="606" width="114" height="38"/>
    <rect x="546" y="606" width="136" height="38"/>
    <rect x="694" y="606" width="188" height="38"/>
  </g>
  <g fill="#ffffff" font-family="monospace" font-size="13" font-weight="700">
    <text x="77" y="630">LISTEN</text>
    <text x="186" y="630">MUTE MIC</text>
    <text x="323" y="630">CAMERA</text>
    <text x="445" y="630">SNAPSHOT</text>
    <text x="572" y="630">DIAGNOSTICS</text>
    <text x="732" y="630">COMMAND JARVIS</text>
  </g>
</svg>
